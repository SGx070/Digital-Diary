<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Diary</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="diary-style.css">
</head>
<body>
<div class="diary-container">
    <h1>Private Secure Diary</h1>
    
    <div id="login-area">
        <input type="text" id="userName" placeholder="Your Username">
        <input type="password" id="userPass" placeholder="Secret Password">
        <button onclick="unlockDiary()">Unlock My Diary</button>
    </div>

    <div id="diary-area" style="display:none;">
        <h2 id="welcome-user"></h2>
        <p id="date-display"></p>
        <textarea id="diary-input"></textarea>
        <div class="button-group">
            <button onclick="encryptAndSave()">Save & Encrypt</button>
            <button onclick="lockDiary()" class="secondary">Lock</button>
        </div>
        <p id="status"></p>
    </div>
</div>
    <script src="diary-script.js"></script>
</body>
</html>
